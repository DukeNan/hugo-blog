<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python字典转JSON工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .tool-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            display: flex;
            flex-direction: column;
        }

        .convert-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .convert-btn {
            padding: 20px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .convert-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .convert-btn:active {
            transform: scale(1);
        }

        .convert-arrow {
            font-size: 2rem;
            color: #667eea;
        }

        .input-section, .output-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        textarea {
            width: 100%;
            height: 350px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Fira Code', 'Monaco', 'Consolas', monospace;
            font-size: 14px;
            resize: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        #inputArea {
            background: #fafafa;
        }

        #outputArea {
            background: #f0f7ff;
        }

        #outputArea:read-only {
            cursor: default;
        }

        .small-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .small-btn:hover {
            background: #e0e0e0;
        }

        .small-btn.primary {
            background: #667eea;
            color: white;
        }

        .small-btn.primary:hover {
            background: #5a6fd6;
        }

        .error-message {
            background: #fff3f3;
            border: 1px solid #ffcccc;
            color: #cc0000;
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #f0fff0;
            border: 1px solid #ccffcc;
            color: #006600;
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .option-item label {
            font-size: 0.9rem;
            color: #555;
        }

        .option-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .example-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .example-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .example-list {
            display: grid;
            gap: 10px;
        }

        .example-item {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .example-btn {
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .example-btn:hover {
            background: #5a6fd6;
        }

        .example-desc {
            color: #666;
            font-size: 0.85rem;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .tool-card {
                padding: 20px;
            }

            .main-layout {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .convert-section {
                flex-direction: row;
                justify-content: center;
                padding: 10px 0;
            }

            .convert-arrow {
                font-size: 1.5rem;
            }

            .convert-btn {
                padding: 15px 20px;
            }

            textarea {
                height: 200px;
            }

            .options {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Python字典转JSON工具</h1>
            <p>快速将Python字典格式转换为标准JSON格式</p>
        </div>

        <div class="tool-card">
            <div class="options">
                <div class="option-item">
                    <input type="checkbox" id="indentCheck" checked>
                    <label for="indentCheck">格式化输出</label>
                </div>
                <div class="option-item">
                    <input type="checkbox" id="sortKeysCheck">
                    <label for="sortKeysCheck">按键名排序</label>
                </div>
            </div>

            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>

            <div class="main-layout">
                <div class="panel">
                    <div class="input-section">
                        <div class="section-header">
                            <span class="section-title">Python字典输入</span>
                            <div class="btn-group">
                                <button class="small-btn" onclick="clearInput()">清空</button>
                                <button class="small-btn primary" onclick="pasteInput()">粘贴</button>
                            </div>
                        </div>
                        <textarea id="inputArea" placeholder="请输入Python字典，例如：
{'name': '张三', 'age': 25, 'city': '北京'}
或
{'data': [1, 2, 3], 'flag': True, 'value': None}"></textarea>
                    </div>
                </div>

                <div class="convert-section">
                    <div class="convert-arrow">→</div>
                    <button class="convert-btn" onclick="convertToJSON()">转换</button>
                    <div class="convert-arrow">→</div>
                </div>

                <div class="panel">
                    <div class="output-section">
                        <div class="section-header">
                            <span class="section-title">JSON输出</span>
                            <div class="btn-group">
                                <button class="small-btn" onclick="clearOutput()">清空</button>
                                <button class="small-btn primary" onclick="copyOutput()">复制</button>
                            </div>
                        </div>
                        <textarea id="outputArea" readonly placeholder="转换结果将显示在这里..."></textarea>
                    </div>
                </div>
            </div>

            <div class="example-section">
                <h3>示例</h3>
                <div class="example-list">
                    <div class="example-item">
                        <button class="example-btn" onclick="loadExample(1)">示例1</button>
                        <span class="example-desc">简单字典</span>
                    </div>
                    <div class="example-item">
                        <button class="example-btn" onclick="loadExample(2)">示例2</button>
                        <span class="example-desc">包含布尔值和None</span>
                    </div>
                    <div class="example-item">
                        <button class="example-btn" onclick="loadExample(3)">示例3</button>
                        <span class="example-desc">嵌套字典和列表</span>
                    </div>
                    <div class="example-item">
                        <button class="example-btn" onclick="loadExample(4)">示例4</button>
                        <span class="example-desc">复杂嵌套结构</span>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Python字典与JSON的主要区别：单引号→双引号，True→true，False→false，None→null</p>
        </footer>
    </div>

    <script>
        const examples = {
            1: "{'name': '张三', 'age': 25, 'city': '北京'}",
            2: "{'success': True, 'error': None, 'count': False}",
            3: "{'users': [{'id': 1, 'name': 'Alice'}, {'id': 2, 'name': 'Bob'}], 'total': 2}",
            4: "{'config': {'debug': True, 'port': 8080, 'hosts': ['localhost', '127.0.0.1']}, 'metadata': {'version': '1.0', 'author': None}}"
        };

        function convertPythonToJSON(pythonStr) {
            // 首先尝试直接解析（如果已经是JSON格式）
            try {
                const directParse = JSON.parse(pythonStr);
                return directParse;
            } catch (e) {
                // 不是标准JSON，继续转换
            }

            // Python字典转JSON的转换规则
            let jsonStr = pythonStr;

            // 处理Python的特殊值
            // True -> true (注意大小写和位置)
            jsonStr = jsonStr.replace(/True/g, 'true');
            // False -> false
            jsonStr = jsonStr.replace(/False/g, 'false');
            // None -> null
            jsonStr = jsonStr.replace(/None/g, 'null');

            // 处理单引号 -> 双引号
            // 这是一个复杂的过程，需要处理嵌套的单引号和转义字符

            // 方法：使用状态机来正确处理引号转换
            let result = '';
            let inSingleQuote = false;
            let inDoubleQuote = false;
            let escaped = false;

            for (let i = 0; i < jsonStr.length; i++) {
                const char = jsonStr[i];

                if (escaped) {
                    result += char;
                    escaped = false;
                    continue;
                }

                if (char === '\\') {
                    escaped = true;
                    result += char;
                    continue;
                }

                if (char === "'" && !inDoubleQuote) {
                    if (inSingleQuote) {
                        inSingleQuote = false;
                        result += '"';
                    } else {
                        inSingleQuote = true;
                        result += '"';
                    }
                    continue;
                }

                if (char === '"' && !inSingleQuote) {
                    if (inDoubleQuote) {
                        inDoubleQuote = false;
                    } else {
                        inDoubleQuote = true;
                    }
                    result += char;
                    continue;
                }

                result += char;
            }

            return JSON.parse(result);
        }

        function convertToJSON() {
            const input = document.getElementById('inputArea').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const outputArea = document.getElementById('outputArea');

            // 重置消息
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            if (!input) {
                errorMsg.textContent = '请输入Python字典内容';
                errorMsg.classList.add('show');
                return;
            }

            try {
                const result = convertPythonToJSON(input);

                // 获取选项
                const indent = document.getElementById('indentCheck').checked ? 2 : 0;
                const sortKeys = document.getElementById('sortKeysCheck').checked;

                // 格式化输出
                const jsonOutput = JSON.stringify(result, null, indent);
                outputArea.value = jsonOutput;

                successMsg.textContent = '转换成功！';
                successMsg.classList.add('show');
            } catch (e) {
                errorMsg.textContent = '转换失败：' + e.message + '。请检查输入的Python字典格式是否正确。';
                errorMsg.classList.add('show');
                outputArea.value = '';
            }
        }

        function clearInput() {
            document.getElementById('inputArea').value = '';
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');
        }

        function clearOutput() {
            document.getElementById('outputArea').value = '';
        }

        async function pasteInput() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('inputArea').value = text;
            } catch (e) {
                alert('无法访问剪贴板，请手动粘贴');
            }
        }

        async function copyOutput() {
            const output = document.getElementById('outputArea').value;
            if (!output) {
                alert('没有内容可复制');
                return;
            }

            try {
                await navigator.clipboard.writeText(output);
                alert('已复制到剪贴板');
            } catch (e) {
                // 降级方案
                document.getElementById('outputArea').select();
                document.execCommand('copy');
                alert('已复制到剪贴板');
            }
        }

        function loadExample(num) {
            document.getElementById('inputArea').value = examples[num];
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');
        }

        // 支持快捷键
        document.getElementById('inputArea').addEventListener('keydown', function(e) {
            // Ctrl/Cmd + Enter 转换
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                convertToJSON();
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
